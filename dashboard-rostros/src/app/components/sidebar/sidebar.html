<div class="sidebar">
    <div class="sidebar-header">
        <div class="profile-avatar">
            <img [src]="userPicture" alt="Profile">
        </div>
        <div class="profile-name">{{ userName }}</div>
        <div class="profile-email" *ngIf="userEmail">{{ userEmail }}</div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-indicator" [style.transform]="'translateY(' + (activeIndex * 52) + 'px)'"></div>
        <ul class="nav-list">
            <li *ngFor="let item of menuItems">
                <a (click)="setActive(item)" [class.active]="isActive(item.label)" class="nav-item">
                    <span class="nav-icon" [ngSwitch]="item.icon">
                        <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        <svg *ngSwitchCase="'pie-chart'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                        <svg *ngSwitchCase="'video'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
                        <svg *ngSwitchCase="'bar-chart'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
                        <svg *ngSwitchCase="'trending-up'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg>
                        <svg *ngSwitchCase="'database'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                        <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    </span>
                    {{ item.label }}
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <button (click)="logout()" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width: 20px; height: 20px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </button>
    </div>
</div>
